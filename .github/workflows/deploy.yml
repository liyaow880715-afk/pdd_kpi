name: Deploy to Server

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare deploy key
        id: deploy_key
        run: |
          python3 - <<'PY'
          import os
          key = open('.github_deploy_key').read().rstrip('\n')
          print('::add-mask::' + key)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('key<<EOF\n')
              f.write(key)
              f.write('\nEOF\n')
          PY

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST || '122.152.201.146' }}
          username: ${{ secrets.SERVER_USER || 'ubuntu' }}
          key: ${{ steps.deploy_key.outputs.key }}
          script: |
            cd /home/ubuntu/pdd_kpi
            git pull origin master
            ./venv/bin/pip install -r requirements.txt -q
            # 清理过时的字节码，避免运行时加载旧逻辑
            find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
            cd frontend
            npm ci
            npm run build
            cd ..
            sudo rm -rf /var/www/pdd_kpi/dist
            sudo cp -r frontend/dist /var/www/pdd_kpi/
            sudo chown -R www-data:www-data /var/www/pdd_kpi
            sudo chmod -R 755 /var/www/pdd_kpi
            sudo systemctl restart pdd_kpi
            sudo systemctl reload nginx
